<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boat AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Boat AI</h1>
      <p>競艇AI分析・期待値判定</p>
    </div>
    <button id="resetBtn" class="ghost">保存データ初期化</button>
  </header>

  <main>
    <section class="panel">
      <div class="section-head">
        <h2>本日開催場</h2>
        <span id="todayLabel"></span>
      </div>
      <div id="venueGrid" class="venue-grid"></div>
    </section>

    <section id="raceSection" class="panel hidden">
      <div class="section-head">
        <h2 id="venueTitle">レース選択</h2>
        <button id="backVenue" class="ghost">開催場に戻る</button>
      </div>
      <div id="raceGrid" class="race-grid"></div>
    </section>

    <section id="analysisSection" class="panel hidden">
      <div class="section-head">
        <div>
          <h2 id="raceTitle">AI予想</h2>
          <p class="muted">現在は手入力＋AI計算。次に公式データ取得を接続する設計。</p>
        </div>
        <button id="backRace" class="ghost">レース選択に戻る</button>
      </div>

      <div class="toolbar">
        <button id="sampleBtn">サンプル入力</button>
        <button id="calcBtn" class="primary">AI計算</button>
        <button id="saveBtn">保存</button>
      </div>

      <div class="weather-box">
        <label>天候<input id="weather" value="晴" /></label>
        <label>風向<input id="windDir" value="向かい風" /></label>
        <label>風速m<input id="windSpeed" type="number" step="0.1" value="2" /></label>
        <label>波高cm<input id="wave" type="number" step="1" value="3" /></label>
      </div>

      <div class="table-wrap">
        <table id="entryTable">
          <thead>
            <tr>
              <th>艇</th><th>選手名</th><th>級</th><th>全国勝率</th><th>当地</th><th>ST</th><th>モーター%</th><th>ボート%</th><th>展示</th><th>チルト</th><th>体重</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="cards">
        <div class="result-card">
          <h3>各艇確率</h3>
          <div id="probList"></div>
        </div>
        <div class="result-card">
          <h3>AI判定</h3>
          <div id="aiDecision" class="decision">未計算</div>
          <p id="aiReason" class="muted"></p>
        </div>
      </div>

      <div class="result-card full">
        <div class="section-head compact">
          <h3>3連単 期待値ランキング</h3>
          <span class="muted">オッズ入力後に期待値を再計算</span>
        </div>
        <div class="table-wrap small">
          <table id="betsTable">
            <thead><tr><th>順位</th><th>買い目</th><th>確率</th><th>オッズ</th><th>期待値</th><th>判定</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="result-card full">
        <h3>結果反映</h3>
        <div class="result-inputs">
          <label>確定3連単<input id="finalResult" placeholder="例 1-3-2" /></label>
          <label>払戻金<input id="payout" type="number" value="0" /></label>
          <label>投資額<input id="stake" type="number" value="1000" /></label>
          <button id="reflectBtn" class="primary">結果反映</button>
        </div>
        <div id="reflectResult" class="decision"></div>
      </div>

      <div class="result-card full">
        <h3>成績</h3>
        <div id="stats" class="stats"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
